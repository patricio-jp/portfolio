<section>
  <app-header [activeSection]="activeSection()"></app-header>
</section>
<main class="landing-section min-h-screen flex items-center justify-center px-4 pt-20">
  <div class="max-w-4xl w-full text-center space-y-8">
    <div class="space-y-6">
      <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight leading-tight drop-shadow-lg">
        Hi there! I'm Patricio 👋
      </h1>
      <p class="text-lg md:text-xl text-white/90 max-w-3xl mx-auto leading-relaxed">
        I'm an aspiring backend developer with a passion for solving problems and creating efficient and scalable solutions.
        I've been refining my skills in full-stack development using NestJS, Angular, and TypeORM.
      </p>
    </div>
    <div class="flex justify-center">
      <z-glass-card
        class="group cursor-pointer hover:scale-105 transition-all duration-300 hover:shadow-2xl"
        blur="lg"
        (click)="goToSection('projects')"
      >
        <button
          type="button"
          class="px-8 py-3 text-white font-medium text-base"
        >
          View Projects
        </button>
      </z-glass-card>
    </div>
  </div>
</main>
<section class="px-4 pb-16 max-w-7xl mx-auto space-y-16 mt-16">
  <app-skills></app-skills>
  <app-projects></app-projects>
  <app-resume></app-resume>
  <app-contact></app-contact>
</section>
