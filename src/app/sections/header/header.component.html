<header
  class="fixed top-0 w-full z-20 bg-transparent md:bg-black"
  [class.bg-black]="isMenuOpen()"
  [class.bg-transparent]="!isMenuOpen()"
>
  <nav class="mx-auto flex justify-between flex-wrap md:justify-end max-w-7xl">
    <button
      type="button"
      (click)="toggleMenu()"
      class="p-4 text-white md:hidden"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="main-menu"
      aria-label="Toggle navigation menu"
    >
      <z-icon [zType]="menuIcon()" zSize="lg"></z-icon>
    </button>
    <ul
      id="main-menu"
      class="bg-black w-full md:w-auto flex-col md:flex-row md:justify-end space-y-2 md:space-y-0 md:space-x-4 hidden md:flex"
      [class.block]="isMenuOpen()"
      [class.hidden]="!isMenuOpen()"
      (click)="isMenuOpen() && toggleMenu()"
    >
      <li>
        <a
          class="block py-2 px-4 hover:bg-gray-600/50 rounded-sm"
          [routerLink]="'/'"
          [class.active]="activeSection() === ''"
        >
          Presentation
        </a>
      </li>
      <li>
        <a
          class="block py-2 px-4 hover:bg-gray-600/50 rounded-sm"
          [routerLink]="'/skills'"
          [class.active]="activeSection() === 'skills'"
        >
          Skills
        </a>
      </li>
      <li>
        <a
          class="block py-2 px-4 hover:bg-gray-600/50 rounded-sm"
          [routerLink]="'/projects'"
          [class.active]="activeSection() === 'projects'"
        >
          Projects
        </a>
      </li>
      <li>
        <a
          class="block py-2 px-4 hover:bg-gray-600/50 rounded-sm"
          [routerLink]="'/resume'"
          [class.active]="activeSection() === 'resume'"
        >
          Resume
        </a>
      </li>
      <li>
        <a
          class="block py-2 px-4 hover:bg-gray-600/50 rounded-sm"
          [routerLink]="'/contact'"
          [class.active]="activeSection() === 'contact'"
        >
          Contact
        </a>
      </li>
    </ul>
  </nav>
</header>
