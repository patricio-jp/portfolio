<header class="fixed top-0 left-0 right-0 z-20">
  <z-glass-card class="rounded-none border-none" blur="lg">
    <nav class="mx-auto max-w-7xl px-4 py-4">
      <div class="flex items-center justify-center relative">
        <button
          type="button"
          (click)="toggleMenu()"
          class="text-white md:hidden p-2 hover:bg-white/10 rounded-lg transition-colors absolute left-0"
          [attr.aria-expanded]="isMenuOpen()"
          aria-controls="main-menu"
          aria-label="Toggle navigation menu"
        >
          <z-icon [zType]="menuIcon()" zSize="lg"></z-icon>
        </button>

        <ul
          id="main-menu"
          class="hidden md:flex md:flex-row md:items-center md:gap-2"
        >
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/'"
              [class.bg-white/20]="activeSection() === ''"
              [class.text-white]="activeSection() === ''"
            >
              Presentation
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/skills'"
              [class.bg-white/20]="activeSection() === 'skills'"
              [class.text-white]="activeSection() === 'skills'"
            >
              Skills
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/projects'"
              [class.bg-white/20]="activeSection() === 'projects'"
              [class.text-white]="activeSection() === 'projects'"
            >
              Projects
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/resume'"
              [class.bg-white/20]="activeSection() === 'resume'"
              [class.text-white]="activeSection() === 'resume'"
            >
              Resume
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/contact'"
              [class.bg-white/20]="activeSection() === 'contact'"
              [class.text-white]="activeSection() === 'contact'"
            >
              Contact
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </z-glass-card>

  <!-- Mobile menu dropdown -->
  @if (isMenuOpen()) {
    <div class="px-4 py-2">
      <z-glass-card class="p-4" blur="lg">
        <ul class="flex flex-col gap-2">
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/'"
              [class.bg-white/20]="activeSection() === ''"
              [class.text-white]="activeSection() === ''"
              (click)="toggleMenu()"
            >
              Presentation
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/skills'"
              [class.bg-white/20]="activeSection() === 'skills'"
              [class.text-white]="activeSection() === 'skills'"
              (click)="toggleMenu()"
            >
              Skills
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/projects'"
              [class.bg-white/20]="activeSection() === 'projects'"
              [class.text-white]="activeSection() === 'projects'"
              (click)="toggleMenu()"
            >
              Projects
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/resume'"
              [class.bg-white/20]="activeSection() === 'resume'"
              [class.text-white]="activeSection() === 'resume'"
              (click)="toggleMenu()"
            >
              Resume
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/contact'"
              [class.bg-white/20]="activeSection() === 'contact'"
              [class.text-white]="activeSection() === 'contact'"
              (click)="toggleMenu()"
            >
              Contact
            </a>
          </li>
        </ul>
      </z-glass-card>
    </div>
  }
</header>
