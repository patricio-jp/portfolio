<header class="fixed top-0 left-0 right-0 z-30">
  <z-glass-card class="rounded-none border-none border-b border-white/15" blur="lg">
    <nav class="mx-auto max-w-7xl px-4">
      <div class="relative flex items-center justify-center py-3">
        <button
          type="button"
          (click)="toggleMenu()"
          class="absolute left-0 text-white md:hidden p-2.5 hover:bg-white/10 rounded-lg transition-colors"
          [attr.aria-expanded]="isMenuOpen()"
          aria-controls="mobile-menu"
          aria-label="Toggle navigation menu"
        >
          @if (isMenuOpen()) {
            <z-icon zType="x" zSize="xl"></z-icon>
          } @else {
            <z-icon zType="menu" zSize="xl"></z-icon>
          }
        </button>

        <ul
          id="desktop-menu"
          class="hidden md:flex md:flex-row md:items-center md:gap-2"
        >
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/'"
              [class.bg-white/20]="activeSection() === ''"
              [class.text-white]="activeSection() === ''"
            >
              Presentation
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/skills'"
              [class.bg-white/20]="activeSection() === 'skills'"
              [class.text-white]="activeSection() === 'skills'"
            >
              Skills
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/projects'"
              [class.bg-white/20]="activeSection() === 'projects'"
              [class.text-white]="activeSection() === 'projects'"
            >
              Projects
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/resume'"
              [class.bg-white/20]="activeSection() === 'resume'"
              [class.text-white]="activeSection() === 'resume'"
            >
              Resume
            </a>
          </li>
          <li>
            <a
              class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
              [routerLink]="'/contact'"
              [class.bg-white/20]="activeSection() === 'contact'"
              [class.text-white]="activeSection() === 'contact'"
            >
              Contact
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </z-glass-card>

  @if (isMenuOpen()) {
    <div class="md:hidden">
      <div class="px-4 pt-2">
        <z-glass-card
          id="mobile-menu"
          class="w-full border-white/15 mobile-menu-glass"
          blur="lg"
          @menuAnimation
        >
          <ul class="flex flex-col gap-2 p-4">
            <li>
              <a
                class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
                [routerLink]="'/'"
                [class.bg-white/20]="activeSection() === ''"
                [class.text-white]="activeSection() === ''"
                (click)="toggleMenu()"
              >
                Presentation
              </a>
            </li>
            <li>
              <a
                class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
                [routerLink]="'/skills'"
                [class.bg-white/20]="activeSection() === 'skills'"
                [class.text-white]="activeSection() === 'skills'"
                (click)="toggleMenu()"
              >
                Skills
              </a>
            </li>
            <li>
              <a
                class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
                [routerLink]="'/projects'"
                [class.bg-white/20]="activeSection() === 'projects'"
                [class.text-white]="activeSection() === 'projects'"
                (click)="toggleMenu()"
              >
                Projects
              </a>
            </li>
            <li>
              <a
                class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
                [routerLink]="'/resume'"
                [class.bg-white/20]="activeSection() === 'resume'"
                [class.text-white]="activeSection() === 'resume'"
                (click)="toggleMenu()"
              >
                Resume
              </a>
            </li>
            <li>
              <a
                class="block px-4 py-2 text-white/90 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 text-sm font-medium"
                [routerLink]="'/contact'"
                [class.bg-white/20]="activeSection() === 'contact'"
                [class.text-white]="activeSection() === 'contact'"
                (click)="toggleMenu()"
              >
                Contact
              </a>
            </li>
          </ul>
        </z-glass-card>
      </div>
    </div>
  }
</header>
